<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secrétariat | AFRICA.TECH21</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Exo 2', 'Segoe UI', sans-serif;
        }

        :root {
            --neon-blue: #00f0ff;
            --neon-purple: #7b2cbf;
            --neon-green: #00ff88;
            --dark-space: #0a0a12;
            --deep-space: #050510;
            --text-primary: #ffffff;
            --text-secondary: #a0a8c0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --panel-glow: 0 0 30px rgba(0, 240, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg, var(--deep-space) 0%, var(--dark-space) 50%, #0f0f1f 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .hologram-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridScan 20s linear infinite;
            pointer-events: none;
            z-index: -2;
        }

        @keyframes gridScan {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .back-btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            margin-bottom: 2rem;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 10px;
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: var(--panel-glow);
        }

        .page-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header .user-info {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        .section {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--panel-glow);
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-blue);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title i {
            color: var(--neon-green);
        }

        /* Éditeur */
        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid var(--glass-border);
        }

        .editor-toolbar button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 0.4rem 0.8rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .editor-toolbar button:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-blue);
        }

        #editorContent {
            width: 100%;
            min-height: 300px;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
        }

        #editorContent:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
        }

        .editor-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn-primary {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 44, 191, 0.4);
        }

        .btn-success {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, var(--neon-green), #00b894);
            border: none;
            border-radius: 10px;
            color: #050510;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        .btn-danger {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #ff4757, #c0392b);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
        }

        .btn-warning {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
        }

        /* Liste des rapports */
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .report-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .report-item:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 240, 255, 0.05);
        }

        .report-item .info {
            flex: 1;
        }

        .report-item .title {
            color: var(--neon-blue);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .report-item .meta {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }

        .report-item .actions {
            display: flex;
            gap: 0.5rem;
        }

        .report-item .actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .report-item .actions button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .report-item .actions .delete:hover {
            color: #ff4757;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 3rem 0;
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--glass-border);
            margin-bottom: 1rem;
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            text-align: center;
            padding: 2rem;
        }

        /* Modal de visualisation */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0a12 0%, #050510 100%);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2.5rem;
            box-shadow: 0 0 60px rgba(123, 44, 191, 0.3);
        }

        .modal-content h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            margin-bottom: 1rem;
        }

        .modal-content .meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .modal-content .body {
            color: var(--text-primary);
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .modal-close {
            margin-top: 1.5rem;
            padding: 0.6rem 1.5rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-weight: 600;
            z-index: 10001;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--neon-green); }
        .toast.error { border-color: #ff4757; }
        .toast.info { border-color: var(--neon-blue); }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .page-header h1 { font-size: 2rem; }
            .section { padding: 1.5rem; }
            .editor-toolbar { gap: 0.3rem; }
            .editor-toolbar button { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
            #editorContent { min-height: 200px; }
            .report-item { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .toast { left: 1rem; right: 1rem; bottom: 1rem; }
        }
    </style>
</head>
<body>
    <div class="hologram-grid"></div>

    <div class="page-container">
        <!-- Bouton retour -->
        <a href="dashboard.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> RETOUR AU DASHBOARD
        </a>

        <!-- En-tête -->
        <header class="page-header">
            <h1><i class="fas fa-pen-fancy"></i> SECRÉTARIAT</h1>
            <p class="user-info" id="userInfo">CHARGEMENT...</p>
        </header>

        <!-- === ÉDITEUR === -->
        <section class="section">
            <h2 class="section-title"><i class="fas fa-edit"></i> RÉDIGER UN COMPTE RENDU</h2>

            <!-- Barre d'outils -->
            <div class="editor-toolbar">
                <button onclick="insertFormat('h1')" title="Titre"><i class="fas fa-heading"></i> H1</button>
                <button onclick="insertFormat('h2')" title="Sous-titre">H2</button>
                <button onclick="insertFormat('h3')" title="Sous-titre">H3</button>
                <span style="width:1px; height:24px; background:var(--glass-border); align-self:center;"></span>
                <button onclick="insertFormat('bold')" title="Gras"><i class="fas fa-bold"></i></button>
                <button onclick="insertFormat('italic')" title="Italique"><i class="fas fa-italic"></i></button>
                <button onclick="insertFormat('underline')" title="Souligné"><i class="fas fa-underline"></i></button>
                <span style="width:1px; height:24px; background:var(--glass-border); align-self:center;"></span>
                <button onclick="insertFormat('ul')" title="Liste à puces"><i class="fas fa-list-ul"></i></button>
                <button onclick="insertFormat('ol')" title="Liste numérotée"><i class="fas fa-list-ol"></i></button>
                <span style="width:1px; height:24px; background:var(--glass-border); align-self:center;"></span>
                <button onclick="insertFormat('hr')" title="Séparateur"><i class="fas fa-minus"></i></button>
            </div>

            <!-- Zone d'édition -->
            <div id="editorContent" contenteditable="true" placeholder="Écrivez votre compte rendu ici..."></div>

            <!-- Actions -->
            <div class="editor-actions">
                <input type="text" id="reportTitle" placeholder="Titre du compte rendu..." style="flex:1; padding:0.8rem 1rem; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; color:var(--text-primary); font-size:1rem; outline:none;">
                <button class="btn-success" onclick="saveReport()"><i class="fas fa-save"></i> SAUVEGARDER</button>
                <button class="btn-danger" onclick="clearEditor()"><i class="fas fa-trash"></i> EFFACER</button>
                <button class="btn-warning" onclick="syncReports()" id="syncBtn"><i class="fas fa-sync"></i> SYNC</button>
            </div>
        </section>

        <!-- === LISTE DES COMPTES RENDUS === -->
        <section class="section">
            <h2 class="section-title"><i class="fas fa-archive"></i> COMPTES RENDUS ENREGISTRÉS</h2>
            <div id="reportList" class="report-list">
                <div class="loading-text">
                    <div class="loading-spinner"></div>
                    Chargement des comptes rendus...
                </div>
            </div>
        </section>
    </div>

    <!-- === MODAL DE VISUALISATION === -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal-content">
            <h2 id="viewTitle">Titre</h2>
            <div class="meta" id="viewMeta">Date</div>
            <div class="body" id="viewBody">Contenu...</div>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i> FERMER</button>
        </div>
    </div>

    <!-- === TOAST NOTIFICATION === -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== CONFIGURATION ====================
       const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyyV86rnSYPMRVIyZ-sE62lQXoVRDvhfKPOppMW7Z2IACqM8s2pGbpXC0BcKUNydBs/exec';
        // ==================== VÉRIFICATION ACCÈS ====================
        const allowedIds = ['AT21_0016', 'AT21_006'];

        if (localStorage.getItem('memberLoggedIn') !== 'true') {
            window.location.href = 'espace-membres.html';
        }

        const memberId = localStorage.getItem('memberId') || '';
        if (!allowedIds.includes(memberId)) {
            document.body.innerHTML = `
                <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:1rem; text-align:center; padding:2rem;">
                    <i class="fas fa-lock" style="font-size:4rem; color:#ff4757;"></i>
                    <h1 style="color:#ff4757;">ACCÈS REFUSÉ</h1>
                    <p style="color:var(--text-secondary);">Cette page est réservée à la Secrétaire Générale et au Président.</p>
                    <a href="dashboard.html" style="color:var(--neon-blue); text-decoration:underline;">Retour au Dashboard</a>
                </div>
            `;
            throw new Error('Accès refusé');
        }

        // ==================== AFFICHAGE INFOS MEMBRE ====================
        const nom = localStorage.getItem('memberNom') || '';
        const prenom = localStorage.getItem('memberPrenom') || '';
        const fonction = localStorage.getItem('memberFonction') || '';
        document.getElementById('userInfo').textContent = `👤 ${prenom} ${nom} - ${fonction} (${memberId})`;

        // ==================== TOAST ====================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // ==================== API GOOGLE SHEETS ====================
        async function saveReportToSheet(title, content, author, date) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'save',
                        title: title,
                        content: content,
                        author: author,
                        date: date
                    })
                });
                // En mode no-cors, on ne peut pas lire la réponse
                return { success: true };
            } catch (error) {
                console.error('Erreur sauvegarde:', error);
                return { success: false, error: error.message };
            }
        }

        async function getReportsFromSheet() {
            try {
                const response = await fetch(SCRIPT_URL + '?action=getAll');
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Erreur récupération:', error);
                return { success: false, error: error.message };
            }
        }

        async function deleteReportFromSheet(index) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'delete',
                        index: index
                    })
                });
                return { success: true };
            } catch (error) {
                console.error('Erreur suppression:', error);
                return { success: false, error: error.message };
            }
        }

        // ==================== GESTION DES COMPTES RENDUS ====================
        let reportsCache = [];

        async function loadReports() {
            const container = document.getElementById('reportList');
            container.innerHTML = `
                <div class="loading-text">
                    <div class="loading-spinner"></div>
                    Chargement des comptes rendus...
                </div>
            `;

            const result = await getReportsFromSheet();

            if (result.success === false) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:#ff4757;"></i>
                        <p style="color:#ff4757;">Erreur de chargement: ${result.error || 'Vérifiez votre connexion'}</p>
                        <button onclick="loadReports()" class="btn-primary" style="margin-top:1rem;">
                            <i class="fas fa-sync"></i> RÉESSAYER
                        </button>
                    </div>
                `;
                return;
            }

            if (!result.data || result.data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>Aucun compte rendu enregistré pour le moment.</p>
                    </div>
                `;
                reportsCache = [];
                return;
            }

            reportsCache = result.data;
            renderReports(reportsCache);
        }

        function renderReports(reports) {
            const container = document.getElementById('reportList');
            if (!reports || reports.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>Aucun compte rendu enregistré pour le moment.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            // Du plus récent au plus ancien
            const sorted = [...reports].reverse();
            sorted.forEach((report, idx) => {
                const realIndex = reports.length - 1 - idx;
                const div = document.createElement('div');
                div.className = 'report-item';
                div.innerHTML = `
                    <div class="info" onclick="viewReport(${realIndex})">
                        <div class="title">${report.title || 'Sans titre'}</div>
                        <div class="meta">📅 ${report.date || 'Date inconnue'} - ✍️ ${report.author || 'Anonyme'}</div>
                    </div>
                    <div class="actions">
                        <button onclick="viewReport(${realIndex})" title="Voir"><i class="fas fa-eye"></i></button>
                        <button class="delete" onclick="deleteReport(${realIndex})" title="Supprimer"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // ==================== SAUVEGARDER ====================
        async function saveReport() {
            const editor = document.getElementById('editorContent');
            const titleInput = document.getElementById('reportTitle');
            const content = editor.innerHTML.trim();
            const title = titleInput.value.trim() || 'Sans titre';

            if (!content || content === '<br>') {
                showToast('⚠️ Veuillez écrire du contenu avant de sauvegarder.', 'error');
                return;
            }

            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            const author = `${localStorage.getItem('memberPrenom') || ''} ${localStorage.getItem('memberNom') || ''}`.trim() || 'Inconnu';

            // Désactiver le bouton pendant la sauvegarde
            const btn = document.querySelector('.btn-success');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> SAUVEGARDE...';

            const result = await saveReportToSheet(title, content, author, dateStr);

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> SAUVEGARDER';

            if (result.success) {
                showToast('✅ Compte rendu sauvegardé avec succès !', 'success');
                editor.innerHTML = '';
                titleInput.value = '';
                await loadReports();
            } else {
                showToast('❌ Erreur lors de la sauvegarde: ' + (result.error || 'Réessayez plus tard.'), 'error');
            }
        }

        // ==================== SUPPRIMER ====================
        async function deleteReport(index) {
            if (!confirm('Voulez-vous vraiment supprimer ce compte rendu ?')) return;

            const btn = document.querySelector(`.report-item .actions .delete`);
            if (btn) btn.disabled = true;

            const result = await deleteReportFromSheet(index);

            if (btn) btn.disabled = false;

            if (result.success) {
                showToast('🗑️ Compte rendu supprimé.', 'info');
                await loadReports();
            } else {
                showToast('❌ Erreur lors de la suppression.', 'error');
            }
        }

        // ==================== SYNC MANUELLE ====================
        async function syncReports() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> SYNC';
            await loadReports();
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sync"></i> SYNC';
            showToast('🔄 Comptes rendus actualisés.', 'info');
        }

        // ==================== VOIR UN COMPTE RENDU ====================
        function viewReport(index) {
            const report = reportsCache[index];
            if (!report) {
                showToast('⚠️ Ce compte rendu n\'existe plus.', 'error');
                loadReports();
                return;
            }

            document.getElementById('viewTitle').textContent = report.title || 'Sans titre';
            document.getElementById('viewMeta').textContent = `📅 ${report.date || 'Date inconnue'} - ✍️ ${report.author || 'Anonyme'}`;
            document.getElementById('viewBody').innerHTML = report.content;
            document.getElementById('viewModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('viewModal').classList.remove('active');
        }

        document.getElementById('viewModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ==================== EFFACER L'ÉDITEUR ====================
        function clearEditor() {
            if (confirm('Voulez-vous vraiment effacer le contenu de l\'éditeur ?')) {
                document.getElementById('editorContent').innerHTML = '';
                document.getElementById('reportTitle').value = '';
            }
        }

        // ==================== FORMATAGE ====================
        function insertFormat(type) {
            const editor = document.getElementById('editorContent');
            editor.focus();

            const sel = window.getSelection();
            if (sel.rangeCount === 0) {
                const range = document.createRange();
                range.setStart(editor, 0);
                sel.addRange(range);
            }

            switch(type) {
                case 'h1': document.execCommand('formatBlock', false, '<h1>'); break;
                case 'h2': document.execCommand('formatBlock', false, '<h2>'); break;
                case 'h3': document.execCommand('formatBlock', false, '<h3>'); break;
                case 'bold': document.execCommand('bold'); break;
                case 'italic': document.execCommand('italic'); break;
                case 'underline': document.execCommand('underline'); break;
                case 'ul': document.execCommand('insertUnorderedList'); break;
                case 'ol': document.execCommand('insertOrderedList'); break;
                case 'hr': document.execCommand('insertHorizontalRule'); break;
                default: break;
            }

            editor.focus();
        }

        // ==================== RACCOURCIS CLAVIER ====================
        document.addEventListener('keydown', function(e) {
            const editor = document.getElementById('editorContent');
            if (document.activeElement !== editor) return;

            if (e.ctrlKey && e.key === 'b') { e.preventDefault(); insertFormat('bold'); }
            if (e.ctrlKey && e.key === 'i') { e.preventDefault(); insertFormat('italic'); }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); insertFormat('underline'); }
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveReport(); }
        });

        // ==================== INIT ====================
        loadReports();
        console.log('🚀 Secrétariat chargé - ID autorisé:', memberId);
    </script>
</body>
</html>
