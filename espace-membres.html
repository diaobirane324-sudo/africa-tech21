<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion | AFRICA.TECH21</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Exo 2', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #050510 0%, #0a0a12 50%, #0f0f1f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hologram-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridScan 20s linear infinite;
            pointer-events: none;
            z-index: -2;
        }

        @keyframes gridScan {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .login-container {
            background: rgba(16, 16, 32, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 30px;
            padding: 4rem 3.5rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 0 60px rgba(123, 44, 191, 0.3);
            position: relative;
            z-index: 1;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 30px;
            background: linear-gradient(45deg, #00f0ff, #7b2cbf);
            z-index: -1;
            opacity: 0.3;
        }

        .logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #00f0ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .logo p {
            color: #a0a8c0;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            color: #00f0ff;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
        }

        .form-group input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 12px;
            color: #ffffff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input::placeholder {
            color: #a0a8c0;
        }

        .login-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #7b2cbf, #00f0ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(123, 44, 191, 0.6);
        }

        .error-message {
            color: #ff4757;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 1rem;
            min-height: 30px;
        }

        .info-text {
            text-align: center;
            color: #a0a8c0;
            font-size: 0.85rem;
            margin-top: 1.5rem;
            line-height: 1.6;
        }

        .info-text i {
            color: #00f0ff;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 2.5rem 1.5rem;
                margin: 1rem;
            }

            .logo h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="hologram-grid"></div>

    <div class="login-container">
        <div class="logo">
            <h1>AFRICA.TECH21</h1>
            <p>ESPACE MEMBRES</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> ID MEMBRE</label>
              <input type="text" id="memberId" autofocus />
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> SE CONNECTER
            </button>

            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="info-text">
            <i class="fas fa-shield-alt"></i> Entrez votre ID unique pour accéder à votre espace
        </div>
    </div>

    <script>
        // ==================== BASE DE DONNÉES DES MEMBRES ====================
        const MEMBRES = {
            "AT21-001": {
                id: "AT21-001",
                nom: "DIAKHATE",
                prenom: "ABDOU",
                fonction: "VICE PRÉSIDENT"
            },
            "AT21_0011": {
                id: "AT21_0011",
                nom: "MOUHAMED",
                prenom: "DIALLO",
                fonction: "RESPONSABLE DES PROJETS"
            },
            "AT21_0016": {
                id: "AT21_0016",
                nom: "DRAMÉ",
                prenom: "AICHA",
                fonction: "SECRÉTAIRE GÉNÉRAL"
            },
            "AT21_0021": {
                id: "AT21_0021",
                nom: "DIOP",
                prenom: "SALAMATA",
                fonction: "ADJOINTE SECRÉTAIRE"
            },
            "AT21_0026": {
                id: "AT21_0026",
                nom: "TOURÉ",
                prenom: "SOKHNA BINTOU",
                fonction: "ADJOINTE FINANCE"
            },
            "AT21_0031": {
                id: "AT21_0031",
                nom: "WADE",
                prenom: "ADJA FAMA",
                fonction: "RESPONSABLE FINANCE"
            },
            "AT21_0036": {
                id: "AT21_0036",
                nom: "NDIAYE",
                prenom: "MARIE ANGÉLIQUE DABA",
                fonction: "RESPONSABLE COMMUNICATION"
            },
            "AT21_0046": {
                id: "AT21_0046",
                nom: "DIALLO",
                prenom: "MOUHAMED",
                fonction: "CRÉATEUR DE CONTENU"
            },
            "AT21_006": {
                id: "AT21_006",
                nom: "BIRANE",
                prenom: "DIAO",
                fonction: "PRÉSIDENT DE LA COMMUNAUTÉ"
            }
        };

        // ==================== GESTION DU FORMULAIRE ====================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const inputId = document.getElementById('memberId').value.trim();
            const errorMessage = document.getElementById('errorMessage');

            // Vérifier si l'ID existe
            if (MEMBRES[inputId]) {
                const membre = MEMBRES[inputId];

                // Stocker les infos dans localStorage
                localStorage.setItem('memberLoggedIn', 'true');
                localStorage.setItem('memberId', membre.id);
                localStorage.setItem('memberNom', membre.nom);
                localStorage.setItem('memberPrenom', membre.prenom);
                localStorage.setItem('memberFonction', membre.fonction);
                localStorage.setItem('memberEmail', membre.prenom + '.' + membre.nom + '@africatech21.com');

                // Rediriger vers le dashboard
                window.location.href = 'dashboard.html';
            } else {
                errorMessage.textContent = '❌ ID non reconnu. Vérifiez votre identifiant.';
                document.getElementById('memberId').value = '';
                document.getElementById('memberId').focus();
            }
        });

        // ==================== ENTRÉE AUTOMATIQUE ====================
        document.getElementById('memberId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
