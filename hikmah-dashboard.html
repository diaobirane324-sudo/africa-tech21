<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikmah's Club - Dashboard Administration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --info: #3498db;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --card-bg: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .glass-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .logo-text h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            color: white;
            font-weight: 700;
        }

        .logo-text span {
            font-size: 0.8rem;
            opacity: 0.8;
            display: block;
        }

        .admin-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
        }

        .admin-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            background: rgba(233, 69, 96, 0.8);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .logout-btn:hover {
            background: var(--highlight);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .nav-container {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 2rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-tab {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        .nav-tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .stats-grid {
            max-width: 1600px;
            margin: 0 auto 30px;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 25px;
            color: white;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
        }

        .stat-label {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .filters-container {
            max-width: 1600px;
            margin: 0 auto 20px;
            padding: 0 2rem;
        }

        .search-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-input:focus {
            outline: none;
            border-color: white;
            background: rgba(255,255,255,0.3);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .filter-btn.active {
            background: white;
            color: var(--primary);
            border-color: white;
            font-weight: 600;
        }

        .students-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 2rem 3rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            color: white;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .add-btn {
            background: white;
            color: var(--primary);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }

        .student-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .student-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .student-card.status-excluded {
            border-left: 5px solid var(--danger);
        }

        .student-card.status-selected {
            border-left: 5px solid var(--success);
        }

        .student-card.status-waiting {
            border-left: 5px solid var(--warning);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .student-avatar {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }

        .student-avatar.bourguiba {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .student-avatar.mbao {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .status-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.selected {
            background: rgba(46, 204, 113, 0.2);
            color: #27ae60;
        }

        .status-badge.waiting {
            background: rgba(243, 156, 18, 0.2);
            color: #f39c12;
        }

        .status-badge.excluded {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .student-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .student-class {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 15px;
            padding: 5px 10px;
            border-radius: 8px;
            display: inline-block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }

        .info-item .info-label {
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-bottom: 2px;
        }

        .info-item .info-value {
            color: var(--dark);
            font-weight: 600;
        }

        .points-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }

        .points-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .points-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }

        .points-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .points-fill.danger { background: var(--danger); }
        .points-fill.warning { background: var(--warning); }
        .points-fill.success { background: var(--success); }

        .exclusion-warning {
            background: rgba(231, 76, 60, 0.1);
            border-left: 3px solid var(--danger);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
            color: var(--danger);
            font-weight: 600;
            margin-top: 10px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .card-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-align: center;
        }

        .btn-edit {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-edit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
            border: 2px solid var(--danger);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }

        .modal-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .points-editor {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .points-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .points-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        .points-display {
            flex: 1;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Montserrat', sans-serif;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #ecf0f1;
            color: var(--dark);
        }

        .btn-cancel:hover {
            background: #bdc3c7;
        }

        .sync-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            z-index: 9999;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        .loading-spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3000;
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; }
            .students-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="logo-text">
                    <h1>HIKMAH'S CLUB</h1>
                    <span>Dashboard Administration</span>
                </div>
            </div>
            <div class="admin-section">
                <div class="admin-profile">
                    <div class="admin-avatar" id="adminInitials">AD</div>
                    <div>
                        <div style="font-weight: 600;" id="adminNameDisplay">Admin</div>
                        <div style="font-size: 0.8rem; opacity: 0.8;" id="adminEmailDisplay">admin@hikmah.com</div>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                </button>
            </div>
        </div>
    </header>

    <div class="nav-container">
        <button class="nav-tab active" data-school="all" onclick="switchSchool('all')">
            <i class="fas fa-globe"></i> Tous les Élèves
        </button>
        <button class="nav-tab" data-school="bourguiba" onclick="switchSchool('bourguiba')">
            <i class="fas fa-school"></i> Bourguiba
        </button>
        <button class="nav-tab" data-school="mbao" onclick="switchSchool('mbao')">
            <i class="fas fa-school"></i> Mbao
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-value" id="totalStudents">0</div>
            <div class="stat-label">Total Élèves</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-value" id="selectedStudents">0</div>
            <div class="stat-label">Sélectionnés</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div class="stat-value" id="waitingStudents">0</div>
            <div class="stat-label">En Attente</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🚫</div>
            <div class="stat-value" id="excludedStudents">0</div>
            <div class="stat-label">Exclus (≤25 pts)</div>
        </div>
    </div>

    <div class="filters-container">
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher par nom, prénom, classe ou club..." oninput="filterStudents()">
            <div class="filter-group" id="classFilters">
                <button class="filter-btn active" data-filter="all" onclick="applyFilter('class', 'all', this)">📚 Toutes</button>
                <button class="filter-btn" data-filter="6éme" onclick="applyFilter('class', '6éme', this)">6éme</button>
                <button class="filter-btn" data-filter="5éme" onclick="applyFilter('class', '5éme', this)">5éme</button>
                <button class="filter-btn" data-filter="4éme" onclick="applyFilter('class', '4éme', this)">4éme</button>
                <button class="filter-btn" data-filter="2nde" onclick="applyFilter('class', '2nde', this)">2nde</button>
                <button class="filter-btn" data-filter="1ére" onclick="applyFilter('class', '1ére', this)">1ére</button>
                <button class="filter-btn" data-filter="TL2" onclick="applyFilter('class', 'TL2', this)">TL2</button>
                <button class="filter-btn" data-filter="TS2" onclick="applyFilter('class', 'TS2', this)">TS2</button>
            </div>
        </div>
    </div>

    <div class="students-container">
        <div class="section-header">
            <h2 class="section-title" id="sectionTitle">👥 Tous les Élèves</h2>
            <button class="add-btn" onclick="openAddModal()">
                <i class="fas fa-plus"></i> Ajouter un Élève
            </button>
        </div>
        <div class="students-grid" id="studentsGrid"></div>
    </div>

    <!-- Modal Modification -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">✏️ Modifier l'Élève</h3>
                <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>Élève</label>
                <input type="text" id="editStudentName" readonly>
            </div>
            <div class="form-group">
                <label>Points Actuels</label>
                <div class="points-editor">
                    <button class="points-btn" onclick="changePoints(-10)">-10</button>
                    <button class="points-btn" onclick="changePoints(-5)">-5</button>
                    <button class="points-btn" onclick="changePoints(-1)">-1</button>
                    <div class="points-display" id="editPoints">0</div>
                    <button class="points-btn" onclick="changePoints(1)">+1</button>
                    <button class="points-btn" onclick="changePoints(5)">+5</button>
                    <button class="points-btn" onclick="changePoints(10)">+10</button>
                </div>
            </div>
            <div class="form-group">
                <label>Nombre d'Absences</label>
                <input type="number" id="editAbsences" value="0" min="0" style="text-align: center; font-size: 1.2rem;">
            </div>
            <div class="form-group">
                <label>Statut</label>
                <select id="editStatus">
                    <option value="Sélectionné">Sélectionné</option>
                    <option value="En attente">En attente</option>
                    <option value="Exclu">Exclu</option>
                </select>
            </div>
            <div class="form-group">
                <label>Code Administrateur</label>
                <input type="password" id="editAdminCode" placeholder="Code requis">
                <div id="codeError" style="color: #e74c3c; font-size: 0.9rem; margin-top: 5px; display: none;">
                    ⚠️ Code incorrect
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="closeModal('editModal')">Annuler</button>
                <button class="modal-btn btn-primary" onclick="saveStudentChanges()">
                    <i class="fas fa-save"></i> Sauvegarder
                </button>

    <script>

const ADMIN_CODE = "194019602026";
const EXCLUSION_THRESHOLD = 25;

        // ============ ÉTAT GLOBAL ============
        let allStudents = [];
        let currentSchool = 'all';
        let currentClassFilter = 'all';
        let currentEditStudent = null;
        let editingPoints = 0;
        let editingAbsences = 0;
        let nextId = 1;

        // ============ INITIALISATION ============
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Démarrage Dashboard Hikmah...');
            showLoading(true);
            
            loadAdminInfo();
            loadStudents();
            renderAll();
            updateStats();
            
            showLoading(false);
            updateSyncStatus(true);
            
            console.log(`✅ Dashboard prêt - ${allStudents.length} élèves chargés`);
        });

        // ============ GESTION ADMIN ============
        function loadAdminInfo() {
            const saved = localStorage.getItem('hikmah_admin');
            if (!saved) {
                const email = prompt('Email administrateur:');
                if (!email) {
                    alert('Email requis pour accéder au dashboard');
                    return;
                }
                const admin = { email: email, name: email.split('@')[0] };
                localStorage.setItem('hikmah_admin', JSON.stringify(admin));
                displayAdminInfo(admin);
            } else {
                displayAdminInfo(JSON.parse(saved));
            }
        }

        function displayAdminInfo(admin) {
            document.getElementById('adminInitials').textContent = admin.name.substring(0, 2).toUpperCase();
            document.getElementById('adminNameDisplay').textContent = admin.name;
            document.getElementById('adminEmailDisplay').textContent = admin.email;
        }

        function logout() {
            if (confirm('Se déconnecter ?')) {
                localStorage.removeItem('hikmah_admin');
                window.location.reload();
            }
        }

        // ============ PERSISTANCE DES DONNÉES ============
        async function loadStudents() {
    // 1. Essayer le cloud d'abord
    if (API_BIN_ID) {
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${API_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': '$2a$10$YOUR_FREE_API_KEY' }
            });
            if (response.ok) {
                const data = await response.json();
                allStudents = data.record;
                console.log('☁️ Données chargées depuis le cloud');
            }
        } catch (e) {
            console.log('⚠️ Cloud inaccessible, fallback localStorage');
        }
    }
    
    // 2. Fallback localStorage
    if (allStudents.length === 0) {
        const saved = localStorage.getItem('hikmah_students');
        if (saved) {
            allStudents = JSON.parse(saved);
            console.log('💾 Données chargées depuis localStorage');
        }
    }
    
    // 3. Données par défaut
    if (allStudents.length === 0) {
        console.log('📦 Initialisation avec données par défaut');
        allStudents = getDefaultStudents();
        await saveStudents();
    }
    
    if (allStudents.length > 0) {
        nextId = Math.max(...allStudents.map(s => s.id || 0)) + 1;
    }
}
        function saveStudents() {
            localStorage.setItem('hikmah_students', JSON.stringify(allStudents));
            updateSyncStatus(true);
            console.log('💾 Données sauvegardées localement');
        }

        function updateSyncStatus(synced) {
            const status = document.getElementById('syncStatus');
            if (synced) {
                status.innerHTML = '<i class="fas fa-save"></i> Sauvegardé localement';
                status.style.background = 'rgba(46, 204, 113, 0.9)';
            }
        }

        // ============ RENDU ============
        function renderAll() {
            let students = getFilteredStudents();
            
            if (students.length === 0) {
                document.getElementById('studentsGrid').innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search" style="font-size: 3rem; margin-bottom: 15px;"></i>
                        <h3>Aucun élève trouvé</h3>
                        <p>Ajustez vos filtres de recherche</p>
                    </div>
                `;
            } else {
                document.getElementById('studentsGrid').innerHTML = students.map(s => createStudentCard(s)).join('');
            }
            
            updateStats();
        }

        function createStudentCard(student) {
            const fullName = `${student.prenom} ${student.nom}`;
            const initials = fullName.split(' ').map(n => n[0] || '').join('').toUpperCase().substring(0, 2);
            const isExcluded = student.points <= EXCLUSION_THRESHOLD;
            const statusClass = isExcluded ? 'status-excluded' : 
                               student.statut === 'Sélectionné' ? 'status-selected' : 'status-waiting';
            const statusBadgeClass = isExcluded ? 'excluded' : 
                                    student.statut === 'Sélectionné' ? 'selected' : 'waiting';
            const statusText = isExcluded ? 'EXCLU' : student.statut;
            const pointsColor = student.points <= EXCLUSION_THRESHOLD ? 'danger' : 
                               student.points <= 50 ? 'warning' : 'success';
            
            return `
                <div class="student-card ${statusClass}">
                    <div class="card-header">
                        <div class="student-avatar ${student.ecole}">${initials}</div>
                        <span class="status-badge ${statusBadgeClass}">${statusText}</span>
                    </div>
                    
                    <h3 class="student-name">${fullName}</h3>
                    <div class="student-class">📚 ${student.classe}</div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Club</div>
                            <div class="info-value">${student.club}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Absences</div>
                            <div class="info-value">${student.absences || 0} jour(s)</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Mandat</div>
                            <div class="info-value">${student.mandat || 'Non défini'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">École</div>
                            <div class="info-value">${student.ecole === 'bourguiba' ? '🏫 Bourguiba' : '🏫 Mbao'}</div>
                        </div>
                    </div>
                    
                    <div class="points-section">
                        <div class="points-header">
                            <span>Points</span>
                            <span style="color: ${student.points <= EXCLUSION_THRESHOLD ? '#e74c3c' : '#2ecc71'}">
                                ${student.points}/100
                            </span>
                        </div>
                        <div class="points-bar">
                            <div class="points-fill ${pointsColor}" style="width: ${student.points}%"></div>
                        </div>
                        ${isExcluded ? 
                            `<div class="exclusion-warning">
                                ⚠️ EXCLU - ${student.points} points (seuil: ${EXCLUSION_THRESHOLD})
                            </div>` : ''
                        }
                    </div>
                    
                    <div class="card-actions">
                        <button class="card-btn btn-edit" onclick="openEditModal(${student.id})">
                            <i class="fas fa-edit"></i> Modifier
                        </button>
                        <button class="card-btn btn-delete" onclick="deleteStudent(${student.id})">
                            <i class="fas fa-trash"></i> Supprimer
                        </button>
                    </div>
                </div>
            `;
        }

        // ============ FILTRES ============
        function getFilteredStudents() {
            let students = [...allStudents];
            
            if (currentSchool !== 'all') {
                students = students.filter(s => s.ecole === currentSchool);
            }
            
            if (currentClassFilter !== 'all') {
                students = students.filter(s => s.classe && s.classe.toString().includes(currentClassFilter));
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            if (searchTerm) {
                students = students.filter(s => 
                    (s.nom && s.nom.toLowerCase().includes(searchTerm)) ||
                    (s.prenom && s.prenom.toLowerCase().includes(searchTerm)) ||
                    (s.classe && s.classe.toString().toLowerCase().includes(searchTerm)) ||
                    (s.club && s.club.toLowerCase().includes(searchTerm))
                );
            }
            
            return students;
        }

        function filterStudents() { renderAll(); }

        function applyFilter(type, value, btn) {
            if (type === 'class') {
                currentClassFilter = value;
                document.querySelectorAll('#classFilters .filter-btn').forEach(b => b.classList.remove('active'));
                if (btn) btn.classList.add('active');
            }
            renderAll();
        }

        function switchSchool(school) {
            currentSchool = school;
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.school === school);
            });
            
            const titles = {
                'all': '👥 Tous les Élèves',
                'bourguiba': '🏫 École Bourguiba',
                'mbao': '🏫 École Mbao'
            };
            document.getElementById('sectionTitle').textContent = titles[school] || '👥 Tous les Élèves';
            
            renderAll();
        }

        // ============ STATISTIQUES ============
        function updateStats() {
            const students = getFilteredStudents();
            document.getElementById('totalStudents').textContent = students.length;
            document.getElementById('selectedStudents').textContent = students.filter(s => s.statut === 'Sélectionné' && s.points > EXCLUSION_THRESHOLD).length;
            document.getElementById('waitingStudents').textContent = students.filter(s => s.statut === 'En attente' && s.points > EXCLUSION_THRESHOLD).length;
            document.getElementById('excludedStudents').textContent = students.filter(s => s.points <= EXCLUSION_THRESHOLD).length;
        }

        // ============ MODIFICATION ÉLÈVE ============
        function openEditModal(studentId) {
            currentEditStudent = allStudents.find(s => s.id === studentId);
            if (!currentEditStudent) return;
            
            editingPoints = currentEditStudent.points;
            editingAbsences = currentEditStudent.absences || 0;
            
            document.getElementById('editStudentName').value = `${currentEditStudent.prenom} ${currentEditStudent.nom}`;
            document.getElementById('editPoints').textContent = editingPoints;
            document.getElementById('editAbsences').value = editingAbsences;
            document.getElementById('editStatus').value = currentEditStudent.statut;
            document.getElementById('editAdminCode').value = '';
            document.getElementById('codeError').style.display = 'none';
            
            document.getElementById('editModal').style.display = 'flex';
        }

        function changePoints(amount) {
            editingPoints = Math.max(0, Math.min(100, editingPoints + amount));
            document.getElementById('editPoints').textContent = editingPoints;
        }

        function saveStudentChanges() {
            const adminCode = document.getElementById('editAdminCode').value;
            
            if (adminCode !== ADMIN_CODE) {
                document.getElementById('codeError').style.display = 'block';
                return;
            }
            
            if (!currentEditStudent) return;
            
            showLoading(true);
            
            editingAbsences = parseInt(document.getElementById('editAbsences').value) || 0;
            if (editingAbsences < 0) editingAbsences = 0;
            
            currentEditStudent.points = editingPoints;
            currentEditStudent.absences = editingAbsences;
            currentEditStudent.statut = document.getElementById('editStatus').value;
            
            if (editingPoints <= EXCLUSION_THRESHOLD) {
                currentEditStudent.statut = 'Exclu';
            }
            
            saveStudents();
            closeModal('editModal');
            renderAll();
            showLoading(false);
            
            alert(`✅ Élève mis à jour !\nPoints: ${editingPoints}\nAbsences: ${editingAbsences}\nStatut: ${currentEditStudent.statut}`);
        }

        // ============ AJOUT ÉLÈVE ============
        function openAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }

        function addStudent() {
            const school = document.getElementById('addSchool').value;
            const nom = document.getElementById('addNom').value.trim();
            const prenom = document.getElementById('addPrenom').value.trim();
            const classe = document.getElementById('addClasse').value;
            const club = document.getElementById('addClub').value;
            const status = document.getElementById('addStatus').value;
            
            if (!nom || !prenom || !classe || !club) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            
            const newStudent = {
                id: nextId++,
                nom,
                prenom,
                classe,
                club,
                statut: status,
                points: 100,
                absences: 0,
                ecole: school,
                mandat: '2024-2025'
            };
            
            allStudents.push(newStudent);
            saveStudents();
            closeModal('addModal');
            renderAll();
            
            document.getElementById('addNom').value = '';
            document.getElementById('addPrenom').value = '';
            document.getElementById('addClasse').value = '';
            document.getElementById('addClub').value = '';
            
            alert('✅ Élève ajouté avec succès !');
        }

        function deleteStudent(studentId) {
            const code = prompt('🔐 Code administrateur pour supprimer:');
            
            if (code !== ADMIN_CODE) {
                alert('❌ Code incorrect.');
                return;
            }
            
            if (!confirm('⚠️ Supprimer définitivement cet élève ?')) return;
            
            showLoading(true);
            allStudents = allStudents.filter(s => s.id !== studentId);
            saveStudents();
            renderAll();
            showLoading(false);
            
            alert('✅ Élève supprimé');
        }
